<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis AI</title>
  <link rel="stylesheet" href="/styles/jarvis.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Title bar -->
  <div id="titlebar">
    <div class="titlebar-drag">
      <img src="/assets/jarvis-logo.svg" alt="Jarvis" class="jarvis-icon" width="28" height="28">
      <span class="jarvis-logo">J.A.R.V.I.S</span>
      <span class="version">v1.0 // GEMINI AI</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-compact" title="Compacto/Full (Alt+M)">◫</button>
      <button id="btn-pin" title="Siempre arriba" class="pinned">📌</button>
      <button id="btn-min" title="Minimizar">─</button>
      <button id="btn-close" title="Ocultar (Alt+J)">✕</button>
    </div>
  </div>

  <!-- Main HUD -->
  <div id="app">
    <!-- Left panel: Status -->
    <aside id="sidebar">
      <div class="status-section">
        <h3>SISTEMA</h3>
        <div id="status-ollama" class="status-item">
          <span class="dot offline"></span> Ollama
        </div>
        <div id="status-camera" class="status-item">
          <span class="dot offline"></span> Camara
        </div>
        <div id="status-shopify" class="status-item">
          <span class="dot offline"></span> Shopify
        </div>
        <div id="status-obsidian" class="status-item">
          <span class="dot online"></span> Obsidian
        </div>
        <div id="status-voice" class="status-item">
          <span class="dot offline"></span> Voz
        </div>
      </div>

      <div class="status-section">
        <h3>PROYECTOS</h3>
        <div id="projects-list"></div>
      </div>

      <div class="status-section">
        <h3>INFO</h3>
        <div id="weather-widget"></div>
        <div id="location-widget"></div>
        <div id="time-widget"></div>
      </div>

      <div class="status-section">
        <h3>ATAJOS</h3>
        <div class="shortcut">Alt+J <span>Mostrar/Ocultar</span></div>
        <div class="shortcut">Alt+V <span>Voz</span></div>
        <div class="shortcut">Enter <span>Enviar</span></div>
      </div>
    </aside>

    <!-- Center: Chat -->
    <main id="chat-area">
      <div id="chat-messages"></div>

      <div id="chat-input-area">
        <div id="voice-indicator" class="hidden">
          <div class="voice-wave"></div>
          <span>Escuchando...</span>
        </div>
        <div id="input-row">
          <button id="btn-voice" title="Hablar (Alt+V)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
              <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
          </button>
          <textarea id="chat-input" placeholder="Habla con Jarvis..." rows="1"></textarea>
          <button id="btn-send" title="Enviar">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
          <button id="btn-camera" title="Camara">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
            </svg>
          </button>
        </div>
      </div>
    </main>

    <!-- Right panel: Camera / Vision -->
    <aside id="right-panel" class="hidden">
      <div class="panel-header">
        <h3>VISION</h3>
        <button id="btn-close-panel">&#x2715;</button>
      </div>
      <div id="camera-feed">
        <img id="camera-img" src="" alt="Camera feed">
        <div class="camera-overlay">
          <div class="scan-line"></div>
        </div>
      </div>
      <button id="btn-analyze" class="action-btn">Analizar</button>
    </aside>
  </div>

  <!-- Servir assets -->
  <script src="/app.js"></script>
  <script>
    // Window controls para Electron y browser
    const isElectron = typeof window.electronAPI !== 'undefined';
    document.getElementById('btn-min')?.addEventListener('click', () => {
      if (isElectron) window.electronAPI?.minimize();
      else window.minimize?.();
    });
    document.getElementById('btn-close')?.addEventListener('click', () => {
      if (isElectron) window.electronAPI?.close();
      else window.close?.();
    });
    document.getElementById('btn-compact')?.addEventListener('click', () => {
      if (isElectron) window.electronAPI?.toggleCompact();
    });
    document.getElementById('btn-pin')?.addEventListener('click', function() {
      if (isElectron) window.electronAPI?.toggleAlwaysOnTop();
      this.classList.toggle('pinned');
    });
  </script>
</body>
</html>
